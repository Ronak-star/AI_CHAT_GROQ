

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat — Groq</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <div class="badge">⚡ Groq powered</div>
    <h1>AI Chat</h1>
    <p>Ask anything — Groq + Llama 3 will answer</p>
  </header>

  <div class="chat-box" id="chatBox">
    <div class="empty-state" id="emptyState">
      <span>💬Hello Ronak</span>
      Ask your first question!
    </div>
  </div>

  <div class="input-area">
    <textarea id="promptInput" placeholder="Type something here..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">↑</button>
  </div>


<script>
  const chatBox = document.getElementById('chatBox');
  const input   = document.getElementById('promptInput');
  const sendBtn = document.getElementById('sendBtn');

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
  }

  function addMessage(role, text) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const prompt = input.value.trim();
    if (!prompt) return;
    addMessage('user', prompt);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      removeTyping();
      if (data.answer) { addMessage('ai', data.answer); }
      else { addMessage('ai', 'Error: ' + (data.error || 'Unknown error')); }
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Could not connect to server. Is Flask running?');
    }
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
